9\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0440\u043e\u0441\u0441\u0438\u044f \u0433\u043e\u0442\u043e\u0432\u0430, \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438 \u0440\u043e\u0441\u0441\u0438\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0432\u0435\u0434\u0435\u0442, \u043e\u0442\u0441\u0442\u0430\u0438\u0432\u0430\u0442\u044c","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u043e\u0439 \u0441\u0442\u043e\u0440\u043e\u043d\u044b, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0438\u0434\u0435\u0442 \u0440\u0435\u0447\u044c, \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044e, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043e\u043f\u0435\u0440\u0430\u0442\u0438\u0432\u043d\u043e\u0435, \u0437\u0430\u0441\u0435\u0434\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438 \u0440\u0444","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043f\u0440\u043e\u0432\u0451\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0445\u043e\u0434\u0435 \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043e\u0431\u0440\u0430\u0442\u0438\u0442\u0441\u044f, 21 \u0441\u0435\u043d\u0442\u044f\u0431\u0440\u044f, \u0441\u043e\u043e\u0431\u0449\u0430\u044e\u0442, \u043e\u0431\u0440\u0430\u0449\u0435\u043d\u0438\u0435, \u0441\u043e\u0441\u0442\u043e\u0438\u0442\u0441\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438 \u0440\u043e\u0441\u0441\u0438\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438, \u0431\u043b\u0438\u0436\u0430\u0439\u0448\u0438\u0435 \u0434\u043d\u0438, \u043e\u0431\u0441\u0443\u0434\u0438\u0442","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u0437\u0430\u0441\u0435\u0434\u0430\u043d\u0438\u0438, \u043f\u0440\u043e\u0432\u0435\u0434\u0435\u0442","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438, \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438 \u0441\u0442\u0440\u0430\u043d\u044b","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0432\u043d\u0435\u0448\u043d\u0435\u0439 \u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0438, \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u043f\u043e\u043e\u0431\u0449\u0430\u043b\u0441\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"21 \u0444\u0435\u0432\u0440\u0430\u043b\u044f, \u043f\u043e\u0441\u043b\u0430\u043d\u0438\u0438, \u043f\u0440\u043e\u0432\u0435\u0434\u0435\u0442, \u043f\u043e\u0441\u043b\u0430\u043d\u0438\u0435, \u0441\u043e\u0441\u0442\u043e\u0438\u0442\u0441\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u044d\u043a\u0441\u0442\u0440\u0435\u043d\u043d\u043e\u0435 \u0437\u0430\u0441\u0435\u0434\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u0437\u0430\u0441\u0435\u0434\u0430\u043d\u0438\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0430, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438, \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044f, \u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0438 \u0440\u043e\u0441\u0441\u0438\u0438","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u0443\u0435\u0442, \u0441\u0430\u043d\u043a\u0446\u0438\u0439, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0440\u0444 \u0441\u0447\u0438\u0442\u0430\u0435\u0442","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044e, \u0433\u043b\u0430\u0432\u043d\u043e\u0435 \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u0439, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0433\u043b\u0430\u0432\u043d\u043e\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u0438\u043b\u043e\u0432\u044b\u0445 \u0432\u0435\u0434\u043e\u043c\u0441\u0442\u0432, \u0440\u043e\u0441\u0433\u0432\u0430\u0440\u0434\u0438\u0438, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u0433\u0435\u043d\u043f\u0440\u043e\u043a\u0443\u0440\u043e\u0440","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043e\u0431\u0441\u0443\u0436\u0434\u0430\u043b\u0438\u0441\u044c \u0432\u043e\u043f\u0440\u043e\u0441\u044b, \u043e\u0431\u0435\u0441\u043f\u043e\u043a\u043e\u0435\u043d\u044b, \u043e\u0431\u0441\u0443\u0436\u0434\u0430\u043b\u0438\u0441\u044c, \u043f\u043e\u0432\u0435\u0441\u0442\u043a\u0435 \u0434\u043d\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0433\u043b\u0430\u0432\u043d\u043e\u0435 \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u0439, \u0433\u0435\u043d\u0448\u0442\u0430\u0431\u0430 \u0432\u0441, \u0433\u043b\u0430\u0432\u043d\u043e\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u0447\u0435\u0441\u0442\u0432\u043e \u0440\u043e\u0441\u0441\u0438\u0435\u0439, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0430, \u0440\u043e\u0441\u0441\u0438\u044e","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0433\u043b\u0430\u0432\u043d\u043e\u0435 \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u0439, \u0433\u043b\u0430\u0432\u043d\u043e\u0435, \u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u0443\u0435\u0442, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0430, \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044e","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0430, \u043f\u0440\u0435\u0441\u0441 \u043a\u043e\u043d\u0444\u0435\u0440\u0435\u043d\u0446\u0438\u0438, \u0437\u0430\u0441\u0435\u0434\u0430\u043d\u0438\u0438, \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438, \u0433\u043b\u0430\u0432\u0430 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0430, \u0441\u0435\u043a\u0440\u0435\u0442\u0430\u0440\u044f \u0440\u043e\u0441\u0441\u0438\u0438, \u0433\u043b\u0430\u0432\u043d\u043e\u0435 \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u0439","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0440\u043e\u0441\u0441\u0438\u0438 \u0432\u0430\u0436\u043d\u043e, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u0443\u0435\u0442, \u0433\u043b\u0430\u0432\u043d\u043e\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u0433\u043b\u0430\u0432\u043d\u043e\u0435 \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u0439, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0440\u0444, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0433\u043b\u0430\u0432\u043d\u043e\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0438 \u0432\u043e\u0439\u043d\u044b, \u0432\u043e\u0439\u043d\u044b \u044d\u0442\u043e, \u0432\u043e\u0439\u043d\u043e\u0439, \u0432\u043e\u0439\u043d\u0443, \u0432\u043e\u0439\u043d\u044b","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u043d\u044b\u0435, \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044e, \u0441\u0432\u043e\u0438 \u043f\u043e\u0437\u0438\u0446\u0438\u0438, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0430, \u0440\u043e\u0441\u0441\u0438\u044f \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442, \u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u0438\u0442\u0435\u043b\u0435\u0439 \u0440\u043e\u0441\u0441\u0438\u0438","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0440\u0444, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u0432\u0430\u0436\u043d\u044b\u0435 \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f, \u043e\u0431\u0441\u0443\u0436\u0434\u0430\u043b\u0438\u0441\u044c","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438, \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438 \u0440\u0444, \u0441\u043e\u0432\u0435\u0442 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0440\u043e\u0432\u0451\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043f\u043e\u0432\u0435\u0441\u0442\u043a\u0435 \u0434\u043d\u044f, \u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438, \u043e\u0431\u0441\u0443\u0434\u0438\u043b, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0432\u043c\u0435\u0448\u0438\u0432\u0430\u0435\u0442\u0441\u044f, \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0434\u0438\u0430\u043b\u043e\u0433","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u043f\u0440\u0435\u0441\u0441, \u0441\u0435\u043a\u0440\u0435\u0442\u0430\u0440\u044f \u0440\u043e\u0441\u0441\u0438\u0438, \u043f\u0440\u0435\u0441\u0441 \u0441\u0435\u043a\u0440\u0435\u0442\u0430\u0440\u044f, \u0440\u043e\u0441\u0441\u0438\u044f \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043f\u0440\u043e\u0432\u0435\u043b \u0437\u0430\u0441\u0435\u0434\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043f\u043e\u0437\u0434\u0440\u0430\u0432\u0438\u043b, \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0445","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0435, \u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u043f\u0440\u0435\u0441\u0441, \u0432\u0435\u0441\u0442\u0438 \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u043f\u0440\u0435\u0441\u0441, \u0443\u043a\u0440\u0430\u0438\u043d\u0441\u043a\u043e\u043c\u0443 \u0432\u043e\u043f\u0440\u043e\u0441\u0443, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u0445, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b, \u043f\u0440\u0435\u0441\u0441 \u0441\u0435\u043a\u0440\u0435\u0442\u0430\u0440\u044f","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438, \u0437\u0430\u0441\u0435\u0434\u0430\u043d\u0438\u0435, \u0437\u0430\u044f\u0432\u0438\u043b \u0434\u043c\u0438\u0442\u0440\u0438\u0439","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0435\u0440\u0435\u043c\u0438\u0440\u0438\u044e, \u043c\u0438\u0440\u043d\u043e\u043c\u0443 \u0443\u0440\u0435\u0433\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e, \u043f\u0435\u0440\u0435\u043c\u0438\u0440\u0438\u044f, \u043c\u0438\u0440\u043d\u043e\u0433\u043e \u0443\u0440\u0435\u0433\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f, \u0440\u043e\u0441\u0441\u0438\u0438 \u0443\u043a\u0440\u0430\u0438\u043d\u0435","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u0445 \u0443\u043a\u0440\u0430\u0438\u043d\u043e\u0439, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0443\u043a\u0440\u0430\u0438\u043d\u043e\u0439, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u0445, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u043a\u0438\u0435\u0432\u043e\u043c, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u0440\u043e\u0441\u0441\u0438\u044f \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442, \u043f\u0435\u0440\u0435\u043c\u0438\u0440\u0438\u0435, \u043e\u0431\u044a\u044f\u0441\u043d\u0438\u043b, \u0440\u043e\u0441\u0441\u0438\u044f \u0443\u043a\u0440\u0430\u0438\u043d\u0430, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0443\u043a\u0440\u0430\u0438\u043d\u043e\u0439","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0443\u043a\u0440\u0430\u0438\u043d\u043e\u0439, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u0445, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b, \u0440\u0430\u0443\u043d\u0434\u0430 \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435_\u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435 \u0447\u043b\u0435\u043d\u0430\u043c\u0438_\u0441\u043e\u0432\u0435\u0442\u0430 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438"],[1,"\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043f\u043e\u0437\u0438\u0446\u0438\u0438 \u0440\u043e\u0441\u0441\u0438\u0438, \u0431\u0440\u0438\u0444\u0438\u043d\u0433\u0430, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043d\u043e\u0439","1_\u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u043 444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0434\u0438\u043b, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0437\u0430\u043c\u0433\u043b\u0430\u0432\u044b \u0440\u0444, \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u043f\u043e\u0441\u0442\u0430\u0432\u043e\u043a \u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u0438\u0439, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438, \u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u0438\u0439","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u044f\u0434\u0435\u0440\u043d\u043e\u0435 \u043e\u0440\u0443\u0436\u0438\u0435, \u044f\u0434\u0435\u0440\u043d\u043e\u0435, \u0437\u0430\u043c\u043f\u0440\u0435\u043 \u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u0432\u044b\u0441\u043a\u0430\u0437\u044b\u0432\u0430\u043b\u0441\u044f, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043e\u0440\u0443\u0436\u0438\u044f \u0443\u043a\u0440\u0430\u0438\u043d\u0435, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u0438\u0439, \u043e\u0440\u0443\u0436\u0438\u0435\u043c, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u0437\u0430\u044f\u0432\u0438\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0430\u0440\u0435\u0441\u0442\u043e\u0432\u0430\u0442\u044c, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u0437\u0430\u044f\u0432\u0438\u043b, \u043f\u0440\u0435\u0437\u0438\u0434\u0435\u043d\u0442\u044b, \u0441\u0448\u0430 \u0445\u043e\u0442\u044f\u0442, \u043d\u0430\u0441\u0442\u0430\u043d\u0435\u0442","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u0437\u0430\u044f\u0432\u0438\u043b, \u043d\u0443\u0436\u043d\u043e, \u0443\u0433\u0440\u043e\u0437\u0430, \u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u0438\u044f, \u043e\u0440\u0443\u0436\u0438\u044f \u0443\u043a\u0440\u0430\u0438\u043d\u0443","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u044f\u0434\u0435\u0440\u043d\u043e\u0435 \u043e\u0440\u0443\u0436\u0438\u0435, \u044f\u0434\u0435\u0440\u043d\u043e\u0435, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0438 \u0432\u043e\u0439\u043d\u044b, \u0432\u0435\u043b\u0438\u043a\u043e\u0431\u0440\u0438\u0442\u0430\u043d\u0438\u044f, \u0432\u043e\u0435\u043d\u043d\u0443\u044e \u043f\u043e\u043c\u043e\u0449\u044c, \u0441\u043e\u044e\u0437\u043d\u0438\u043a\u043e\u043c, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0442\u0435\u0440\u0440\u043e\u0440\u0438\u0441\u0442\u0430\u043c\u0438, \u0442\u0435\u0440\u0440\u043e\u0440\u0438\u0441\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0445, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0443\u043d\u0438\u0447\u0442\u043e\u0436\u0430\u0442\u044c, \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438 \u0440\u043e\u0441\u0441\u0438\u0438","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0441\u0432\u043e\u0438 \u043f\u043e\u0437\u0438\u0446\u0438\u0438, \u0441\u043b\u0435\u0434\u044f\u0442, \u043d\u0443\u0436\u043d\u044b, insider, \u043f\u0440\u0438\u0431\u043b\u0438\u0436\u0430\u0435\u0442\u0441\u044f","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043f\u043e\u0441\u0435\u0442\u0438\u043b, \u043f\u043e\u0431\u044b\u0432\u0430\u043b, \u043e\u0441\u043c\u043e\u0442\u0440\u0435\u043b, \u043e\u0437\u043d\u0430\u043a\u043e\u043c\u0438\u043b\u0441\u044f, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043c\u0438\u0440\u043d\u044b\u0445 \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043d\u044b\u0439 \u043f\u0440\u043e\u0446\u0435\u0441\u0441, \u043c\u0438\u0440\u043d\u044b\u0435 \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0437\u0430\u043c\u043f\u0440\u0435\u0434\u0430 \u0440\u0444","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0437\u0430\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u0434\u043c\u0438\u0442\u0440\u0438\u044f, \u043c\u043d\u0435\u043d\u0438\u0435, \u0435\u0432\u0440\u043e\u043f\u0435, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0441\u043b\u043e\u0432\u0430\u043c","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0431\u0435\u0441\u043f\u0438\u043b\u043e\u0442\u043d\u0438\u043a\u0430, \u0431\u0435\u0441\u043f\u0438\u043b\u043e\u0442\u043d\u0438\u043a\u043e\u0432, \u0431\u0435\u0441\u043f\u0438\u043b\u043e\u0442\u043d\u0438\u043a, \u0431\u0435\u0441\u043f\u0438\u043b\u043e\u0442\u043d\u044b\u0445, \u043f\u0440\u043e\u0432\u0435\u043b \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0432\u043e\u0439\u043d\u044b, \u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434, \u0432\u043e\u0435\u043d\u043d\u043e, \u0432\u0435\u043b\u0438\u043a\u043e\u0431\u0440\u0438\u0442\u0430\u043d\u0438\u0435\u0439, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043e\u0431\u0441\u0443\u0434\u0438\u0442\u044c, \u0432\u043e\u0435\u0432\u0430\u0442\u044c","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0443\u043a\u0440\u0430\u0438\u043d\u043e\u0439, \u0432\u043b\u0430\u0441\u0442\u0438 \u0443\u043a\u0440\u0430\u0438\u043d\u044b, \u0443\u043a\u0440\u0430\u0438\u043d\u0430, \u0442\u0435\u0440\u0440\u0438\u0442\u043e\u0440\u0438\u0438 \u0443\u043a\u0440\u0430\u0438\u043d\u044b, \u044d\u0442\u043e \u0440\u043e\u0441\u0441\u0438\u044f","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0442\u0435\u0440\u0430\u043a\u0442\u0443, \u0442\u0435\u0440\u0430\u043a\u0442\u0435, \u0442\u0435\u0440\u0440\u043e\u0440\u0438\u0441\u0442\u043e\u0432, \u0442\u0435\u0440\u0440\u043e\u0440\u0438\u0441\u0442\u044b, \u0441\u0435\u043c\u044c\u044f\u043c \u043f\u043e\u0433\u0438\u0431\u0448\u0438\u0445","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043f\u043e\u0431\u0435\u0434\u0438\u0442, \u043f\u043e\u0431\u0435\u0434\u0438\u043c, \u043d\u0435\u043e\u043d\u0430\u0446\u0438\u0441\u0442\u043e\u0432, \u0433\u043e\u043b\u043e\u0441\u043e\u0432\u0430\u043d\u0438\u0435, \u0432\u0435\u043b\u0438\u043a\u043e\u0439 \u043f\u043e\u0431\u0435\u0434\u044b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u0438\u0439, \u043e\u0440\u0443\u0436\u0438\u0435\u043c, \u044f\u0434\u0435\u0440\u043d\u043e\u0435 \u043e\u0440\u0443\u0436\u0438\u0435, \u043e\u0440\u0443\u0436\u0438\u0435, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0441\u0430\u043d\u043a\u0446\u0438\u0439, \u0441\u0430\u043d\u043a\u0446\u0438\u0438, \u0434\u043e\u0433\u043e\u0432\u0430\u0440\u0438\u0432\u0430\u0442\u044c\u0441\u044f, \u043a\u0440\u0438\u0437\u0438\u0441\u0430, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043f\u0440\u0435\u0434\u0430\u0442\u0435\u043b\u0438, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434, \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u0445 \u0443\u043a\u0440\u0430\u0438\u043d\u043e\u0439, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043d\u044b\u0439, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u0445, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u043e\u0432, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0432\u0440\u0430\u0433\u043e\u0432 \u0440\u043e\u0441\u0441\u0438\u0438, \u0432\u0440\u0430\u0433\u043e\u0432, \u043f\u0440\u043e\u0442\u0438\u0432\u043d\u0438\u043a\u043e\u0432, \u0434\u0430\u043d\u043d\u044b\u0445, \u043f\u043e\u0434\u0443\u043c\u0430\u0442\u044c","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u043c, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u0430\u0445, \u043f\u0435\u0440\u0435\u043c\u0438\u0440\u0438\u0438, \u043e\u0442\u0440\u0435\u0430\u0433\u0438\u0440\u043e\u0432\u0430\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u044f\u0434\u0435\u0440\u043d\u043e\u043c\u0443, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e, \u0443\u0433\u0440\u043e\u0437\u0430, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0441\u0442\u0432\u043e \u0443\u043a\u0440\u0430\u0438\u043d\u044b, \u0443\u043a\u0440\u0430\u0438\u043d\u044b \u0437\u0430\u044f\u0432\u0438\u043b, \u0443\u0431\u0438\u0439\u0441\u0442\u0432\u0430, \u0443\u043d\u0438\u0447\u0442\u043e\u0436\u0438\u0442\u044c, \u043a\u0438\u0435\u0432\u0441\u043a\u043e\u0433\u043e \u0440\u0435\u0436\u0438\u043c\u0430","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0442\u043e\u0432\u0430\u0440\u0438\u0449\u0438, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0433\u043e\u0432\u043e\u0440\u044f, \u043a\u0430\u0431\u0438\u043d\u0435\u0442\u0435, \u043f\u0440\u0430\u0432\u0434\u0443","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0431\u0435\u0441\u043f\u0438\u043b\u043e\u0442\u043d\u0438\u043a\u043e\u0432, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0432\u043e\u0437\u0434\u0443\u0448\u043d\u043e\u0439 \u043e\u0431\u043e\u0440\u043e\u043d\u044b, \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0432\u043e\u0437\u0434\u0443\u0448\u043d\u043e\u0439, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0441\u043d\u0430\u0440\u044f\u0434\u043e\u0432, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u043f\u043e\u0441\u0435\u0442\u0438\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b \u0440\u043e\u0441\u0441\u0438\u0435\u0439, \u043c\u0438\u0440\u043d\u044b\u0435 \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b, \u0443\u043a\u0440\u0430\u0438\u043d\u0443, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u044f\u0434\u0435\u0440\u043d\u044b\u0435, \u044f\u0434\u0435\u0440\u043d\u043e\u0435 \u043e\u0440\u0443\u0436\u0438\u0435, \u044f\u0434\u0435\u0440\u043d\u043e\u0435, \u044f\u0434\u0435\u0440\u043d\u044b\u0439, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438, \u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444, \u0443\u0433\u0440\u043e\u0437\u044b, \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0430\u043c\u0435\u0440\u0438\u043a\u0430\u043d\u0446\u0430\u043c, \u0433\u043e\u043b\u043e\u0432\u044b, \u0441\u043f\u0435\u0446\u043d\u0430\u0437, \u0443\u043c\u0435\u044e\u0442, \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u0444_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u0440\u043e\u0441\u0441\u0438\u0438_\u0437\u0430\u044f\u0432\u0438\u043b \u0437\u0430\u043c\u043f\u0440\u0435\u0434_\u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b"],[2,"\u0434\u0440\u043e\u043d\u043e\u0432, \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430, \u0434\u043c\u0438\u0442\u0440\u0438\u0439 \u043f\u0440\u043e\u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043b, \u0432\u043e\u0439\u043d\u0443, \u0441\u0430\u043d\u043a\u0446\u0438\u044f\u043c\u0438","2_\u0437\u0430\u043c\u043f\u0440\u0435\u0434 \u
