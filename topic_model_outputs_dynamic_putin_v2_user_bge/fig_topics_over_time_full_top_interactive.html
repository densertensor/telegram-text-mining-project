\u0435\u043f\u043b\u0435\u043d\u0438\u044e, \u043f\u0430\u0440\u043b\u0430\u043c\u0435\u043d\u0442\u0435, \u043e\u0434\u043e\u0431\u0440\u0438\u043b","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043f\u043e\u043c\u043e\u0447\u044c, \u043e\u0440\u0443\u0436\u0438\u0435\u043c, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u0432\u043e\u0435\u043d\u043d\u044b\u0439 \u043e\u0441\u0432\u0435\u0434\u043e\u043c\u0438\u0442\u0435\u043b\u044c, \u043b\u0438\u0434\u0435\u0440\u0430","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438, \u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u044f, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u043c\u0438\u0442\u0438\u043d\u0433, \u043f\u0440\u0435\u0437\u0438\u0434\u0435\u043d\u0442\u0441\u043a\u043e\u0433\u043e","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043f\u0430\u0440\u043b\u0430\u043c\u0435\u043d\u0442\u0435, \u043f\u0440\u0435\u0437\u0438\u0434\u0435\u043d\u0442\u044b, \u043d\u0430\u043f\u0430\u0434\u0435\u043d\u0438\u0435, \u043f\u0440\u043e\u0438\u0437\u043e\u0448\u0435\u043b, \u044e\u0436\u043d\u043e\u0439","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u0432\u043d\u0435\u0448\u043d\u0435\u0439 \u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0438, \u0440\u0435\u0447\u044c \u0438\u0434\u0435\u0442, \u043e\u0442\u043c\u0435\u043d\u0438\u0442\u044c, \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f\u0445, \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u0442\u0435\u043b\u0435\u0444\u043e\u043d\u043d\u044b\u0439 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440, \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440, \u0441\u043e\u0441\u0442\u043e\u044f\u043b\u0441\u044f, \u043f\u043e\u0441\u043b\u0435\u0434\u043d\u0435\u0435 \u0432\u0440\u0435\u043c\u044f, \u044e\u0436\u043d\u043e\u0439","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043d\u0430\u0447\u0430\u043b\u0438\u0441\u044c, \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430, \u043f\u0440\u0438\u0445\u043e\u0434\u0438\u0442\u0441\u044f, \u043d\u0443\u0436\u043d\u043e, \u044d\u0441\u043a\u0430\u043b\u0430\u0446\u0438\u0438","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u0438\u0439, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u0440\u0435\u0447\u044c \u0438\u0434\u0435\u0442, \u0443\u043a\u0440\u0430\u0438\u043d\u0443, \u0432\u043e\u0435\u043d\u043d\u044b\u0435","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u0440\u0435\u0447\u044c \u0438\u0434\u0435\u0442, \u044f\u0434\u0435\u0440\u043d\u043e\u0439, \u044e\u0436\u043d\u043e\u0439, \u043f\u0440\u043e\u0432\u043e\u043a\u0430\u0446\u0438\u0438","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043e\u0442\u0440\u0435\u0430\u0433\u0438\u0440\u043e\u0432\u0430\u043b\u0438, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u0440\u0435\u0447\u044c \u0438\u0434\u0435\u0442, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e, \u044f\u0434\u0435\u0440\u043d\u043e\u0439","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u0441\u043e\u0441\u0442\u043e\u044f\u0442\u0441\u044f, \u0440\u0435\u0447\u044c \u0438\u0434\u0435\u0442, \u0432\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u043d\u044b\u0445, \u044f\u0434\u0435\u0440\u043d\u043e\u0433\u043e \u043e\u0440\u0443\u0436\u0438\u044f, \u0440\u0430\u0441\u0441\u043c\u0430\u0442\u0440\u0438\u0432\u0430\u044e\u0442","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u0443\u0433\u0440\u043e\u0437\u0443, \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0435, \u043e\u043f\u0430\u0441\u0435\u043d\u0438\u044f, \u0440\u043e\u0441\u0441\u0438\u044e, \u0432\u043d\u0435\u0448\u043d\u0435\u0439 \u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0438","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443, \u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442, \u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438, \u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438, \u043f\u0440\u043e\u0442\u0435\u0441\u0442\u044b","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443, \u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442\u0430, \u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438, \u0430\u0440\u0435\u0441\u0442\u0430, \u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u044f","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u0430\u0440\u0435\u0441\u0442\u0430, \u0430\u0440\u0435\u0441\u0442, \u0437\u0430\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u044f, \u0437\u0430\u0434\u0435\u0440\u0436\u0430\u043b\u0438, \u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442\u0430","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438"],[3,"\u043e\u0442\u0440\u0435\u0430\u0433\u0438\u0440\u043e\u0432\u0430\u043b\u0438, \u044e\u0436\u043d\u043e\u0439, \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b, \u0432\u043b\u0430\u0441\u0442\u044c\u044e, \u044d\u0442\u043e \u043f\u0440\u043e\u0438\u0437\u043e\u0448\u043b\u043e","3_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0443_\u043e\u0442\u0441\u0442\u0430\u0432\u043a\u0438_\u043f\u0435\u0440\u0435\u0432\u043e\u0440\u043e\u0442_\u043e\u043f\u043f\u043e\u0437\u0438\u0446\u0438\u0438
